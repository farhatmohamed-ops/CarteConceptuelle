<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كان وأخواتها</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --bg-site: #E3F2FD;
            --main-color: #1976D2;
            --accent-color: #FF9800;
            --success-color: #4CAF50;
            --home-color: #FF6B6B; 
            --text-dark: #2C3E50;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-site);
            background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: var(--text-dark);
            position: relative;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px; 
            text-decoration: none;
            background-color: var(--home-color);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 0 #D32F2F;
            transition: all 0.2s;
            z-index: 1000;
        }

        .home-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #D32F2F;
        }

        .answers-pool {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 0 #CFD8DC;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            
            /* تثبيت الحجم هنا */
            width: 85%;
            max-width: 900px;
            height: 140px; /* حدد الارتفاع الذي يناسب حجم عناصرك عند البداية */
            
            margin-top: 60px; 
            margin-bottom: 30px;
            border: 3px solid var(--main-color);
            box-sizing: border-box; 
        }

        .drag-item {
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: grab;
            font-weight: 800;
            box-shadow: 0 4px 0 #E65100;
            user-select: none;
        }

        .map-area {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            border: 4px dashed var(--main-color);
            margin-bottom: 50px;
        }

        .node {
            position: absolute;
            padding: 15px 25px;
            border-radius: 20px;
            font-weight: 700;
            text-align: center;
            transform: translate(-50%, -50%);
            white-space: normal;     
            min-width: 180px;
            max-width: 320px;          
            line-height: 1.8;          
            font-size: 1rem;
            background: white;
            border: 3px solid var(--main-color);
            box-shadow: 0 4px 0 #CFD8DC;
        }

        .node-main {
            background: var(--main-color);
            color: white;
            font-size: 1.5rem;
            z-index: 10;
            box-shadow: 0 8px 0 #0D47A1;
            top: 50%; left: 50%;
            border: none;
        }

        /* --- تثبيت حجم مناطق الإفلات --- */
        .inline-drop {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 110px; /* عرض ثابت كما طلبت */
            height: 38px; /* ارتفاع ثابت */
            background: #F5F5F5;
            border: 2px dashed #BDBDBD;
            border-radius: 8px;
            vertical-align: middle;
            margin: 2px 5px;
            transition: all 0.3s;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.95rem;
            font-weight: 800;
            color: transparent; /* إخفاء النص الأولي */
        }

        /* --- ضمان تطبيق اللون الأخضر --- */
        .inline-drop.correct {
            background: var(--success-color) !important;
            border: 2px solid var(--success-color) !important;
            color: white !important;
            box-shadow: 0 3px 0 #2E7D32 !important;
        }

        .static-node {
            background-color: #E0E0E0 !important;
            border: 2px solid #BDBDBD !important;
            cursor: default !important;
        }

        svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #victory {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10000;
            border: 5px solid var(--success-color);
        }

        @media (max-width: 768px) {
            .home-btn { position: relative; top: 0; left: 0; margin-bottom: 10px; }
            .map-area { height: auto; min-height: 800px; padding: 20px 0; }
            .node { position: relative; transform: none; left: auto !important; top: auto !important; margin: 20px auto; }
            svg { display: none; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">
        <span>🏠</span>
        الرئيسية
    </a>

    <h1 id="game-title">أكمل الخريطة المفاهيمية</h1>
    
    <div class="answers-pool" id="answers-pool"></div>

    <div class="map-area" id="map-area">
        <svg id="lines-svg"></svg>
        <div class="node node-main" id="main-node">مركب<br>إضافي</div>
    </div>

    <div id="victory">
        <h2>🎉 ممتاز! 🎉</h2>
        <p>لقد نجحت في إكمال الخريطة بذكاء.</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer; background: var(--accent-color); color:white; border:none; border-radius:10px; font-weight:bold; font-family:'Cairo'">العب مرة أخرى</button>
            <a href="index.html" style="padding:10px 20px; text-decoration:none; background: var(--main-color); color:white; border-radius:10px; font-weight:bold; font-family:'Cairo'">الخروج</a>
        </div>
    </div>

    <script>
        const config = {
            title: "خريطة كان وأخواتها",
            elements: [
                { type: "multi", text: "مبتدأ: مرفوع + خبر: <br>=[مرفوع] مثال:\n<br>=[القطار السريع]", x: "25%", y: "75%" },
                { type: "multi", text: "التطبيق:\n صار (<br>=[ناسخ]) القطار (<br>=[اسم ناسخ]) سريعا (<br>=[خبر الناسخ])", x: "20%", y: "25%" },
                { type: "multi", text: "دخول النواسخ الفعلية (كان / أصبح / أضحى / ظل / صار / أمسى / ليس / بات)\nالمبتدأ: إسم ناسخ : <br>=[مرفوع] \n الخبر: خبر الناسخ: <br>=[منصوب]", x: "80%", y: "25%" }

            ]
        };

        const pool = document.getElementById('answers-pool');
        const map = document.getElementById('map-area');
        const svg = document.getElementById('lines-svg');
        let totalBlanks = 0; 
        let solved = 0;
        let allAnswers = []; 

        function initGame() {
            document.getElementById('game-title').innerText = config.title;

            config.elements.forEach((el) => {
                const zone = document.createElement('div');
                zone.className = 'node';
                zone.style.left = el.x;
                zone.style.top = el.y;

                if (el.type === 'static') {
                    zone.classList.add('static-node');
                    zone.innerHTML = el.text;
                } 
                else if (el.type === 'multi') {
                    let formattedText = el.text.replace(/\[([^\]]+)\]/g, (match, word) => {
                        allAnswers.push(word);
                        totalBlanks++;
                        return `<span class="inline-drop" data-answer="${word}"></span>`;
                    });
                    
                    zone.innerHTML = formattedText;

                    setTimeout(() => {
                        const dropZones = zone.querySelectorAll('.inline-drop');
                        dropZones.forEach(drop => {
                            drop.addEventListener('dragover', (e) => e.preventDefault());
                            drop.addEventListener('drop', handleDrop);
                        });
                    }, 0);
                }

                map.appendChild(zone);
                drawLine(el.x, el.y);
            });

            const shuffledAnswers = [...allAnswers].sort(() => Math.random() - 0.5);
            shuffledAnswers.forEach((answer, index) => {
                const dragEl = document.createElement('div');
                dragEl.className = 'drag-item';
                dragEl.innerText = answer;
                dragEl.draggable = true;
                dragEl.id = `drag-${index}`;
                dragEl.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', answer + '|' + dragEl.id));
                pool.appendChild(dragEl);
            });
        }

        function drawLine(x, y) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", "50%"); line.setAttribute("y1", "50%");
            line.setAttribute("x2", x); line.setAttribute("y2", y);
            line.setAttribute("stroke", "#BDBDBD"); line.setAttribute("stroke-width", "3");
            line.style.zIndex = "-1"; 
            svg.appendChild(line);
        }

        function handleDrop(e) {
            e.preventDefault();
            
            // التأكد من استهداف منطقة الإفلات بشكل دقيق جداً لتجنب الأخطاء
            const dropZone = e.target.closest('.inline-drop');
            if (!dropZone) return; 

            const rawData = e.dataTransfer.getData('text');
            if (!rawData) return;

            const data = rawData.split('|');
            // استخدام trim() لحذف أي مسافات زائدة قد تمنع التطابق
            const val = data[0] ? data[0].trim() : ""; 
            const id = data[1];

            const targetAnswer = dropZone.dataset.answer ? dropZone.dataset.answer.trim() : "";

            if (val === targetAnswer && !dropZone.classList.contains('correct')) {
                dropZone.innerText = val; 
                dropZone.classList.add('correct'); // هذه الكلاس ستفعل اللون الأخضر الثابت
                
                const draggedElement = document.getElementById(id);
                if (draggedElement) draggedElement.style.display = 'none'; 
                
                solved++;
        
                if (solved === totalBlanks) {
                    document.getElementById('victory').style.display = 'block';
                }
            } else if (!dropZone.classList.contains('correct')) {
                dropZone.style.backgroundColor = '#FFEBEE';
                dropZone.style.borderColor = 'red';
                setTimeout(() => {
                    dropZone.style.backgroundColor = '#F5F5F5';
                    dropZone.style.borderColor = '#BDBDBD';
                }, 500);
            }
        }

        initGame();
    </script>
</body>
</html>
